<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TouchDesigner MCP Agent Panel</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 40, 51, 0.45);
            --border-color: rgba(102, 252, 241, 0.25);
            --primary-glow: #66fcf1;
            --primary-dim: #45f3e5;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
            --user-bubble: rgba(69, 162, 158, 0.3);
            --agent-bubble: rgba(31, 40, 51, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(90, 21, 107, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(10, 102, 115, 0.15) 0%, transparent 40%);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(11, 12, 16, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 span {
            color: var(--primary-glow);
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.45);
        }

        .config-bar {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        select, input {
            background: rgba(31, 40, 51, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-bright);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 5px rgba(102, 252, 241, 0.2);
        }

        input[type="password"] {
            width: 150px;
        }

        #main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
        }

        #chat-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.45;
            font-size: 0.95rem;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid rgba(102, 252, 241, 0.3);
            color: var(--text-bright);
            border-bottom-right-radius: 2px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--agent-bubble);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 2px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            border: none;
            color: var(--primary-glow);
            font-family: monospace;
            font-size: 0.8rem;
            opacity: 0.8;
            max-width: 100%;
        }

        .message code {
            font-family: 'Fira Code', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .message pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message pre code {
            background: none;
            padding: 0;
        }

        #input-area {
            display: flex;
            padding: 15px 20px;
            background: rgba(11, 12, 16, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            gap: 10px;
        }

        #prompt-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 12px;
            font-size: 0.95rem;
        }

        #send-btn {
            background: var(--primary-glow);
            border: none;
            color: var(--bg-color);
            font-weight: 700;
            padding: 0 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        #send-btn:hover {
            background: var(--primary-dim);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        #send-btn:disabled {
            background: rgba(102, 252, 241, 0.2);
            color: rgba(255, 255, 255, 0.25);
            cursor: not-allowed;
            box-shadow: none;
        }

        #sidebar {
            flex: 1;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            max-width: 320px;
        }

        #sidebar h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--text-bright);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #sidebar h2 button {
            background: none;
            border: none;
            color: var(--primary-glow);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5555;
            box-shadow: 0 0 8px #ff5555;
        }

        .status-dot.active {
            background: #55ff55;
            box-shadow: 0 0 8px #55ff55;
        }

        .node-item {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .node-type {
            color: var(--primary-glow);
        }
    </style>
</head>
<body>

    <header>
        <h1>TouchDesigner <span>MCP Agent</span></h1>
        <div class="config-bar">
            <select id="provider-select">
                <option value="ollama">Ollama (Offline)</option>
                <option value="gemini">Gemini API</option>
                <option value="openai">OpenAI API</option>
            </select>
            <input type="password" id="api-key" placeholder="API Key" />
            <input type="text" id="auth-token" placeholder="Bridge Auth Token" />
        </div>
    </header>

    <div id="main-container">
        <div id="chat-area">
            <div id="messages">
                <div class="message agent">Hello! I am your TouchDesigner builder agent. Tell me what network node chains to build under <code>*here</code>!</div>
            </div>
            <div id="input-area">
                <input type="text" id="prompt-input" placeholder="e.g. Add a Wave CHOP and connect it to a Null..." />
                <button id="send-btn">Send</button>
            </div>
        </div>

        <div id="sidebar">
            <h2>System Status</h2>
            <div class="status-indicator">
                <div id="bridge-dot" class="status-dot"></div>
                <span id="bridge-label">Bridge Offline</span>
            </div>
            <h2>Live Network Nodes <button id="refresh-nodes">Refresh</button></h2>
            <div id="nodes-list"></div>
        </div>
    </div>

    <script>
        // Store configuration in localStorage
        const config = {
            get provider() { return localStorage.getItem('td_mcp_provider') || 'ollama'; },
            set provider(v) { localStorage.setItem('td_mcp_provider', v); },
            get apiKey() { return localStorage.getItem('td_mcp_api_key') || ''; },
            set apiKey(v) { localStorage.setItem('td_mcp_api_key', v); },
            get token() { return localStorage.getItem('td_mcp_token') || ''; },
            set token(v) { localStorage.setItem('td_mcp_token', v); }
        };

        const providerSelect = document.getElementById('provider-select');
        const apiKeyInput = document.getElementById('api-key');
        const tokenInput = document.getElementById('auth-token');
        const messagesDiv = document.getElementById('messages');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const bridgeDot = document.getElementById('bridge-dot');
        const bridgeLabel = document.getElementById('bridge-label');
        const nodesList = document.getElementById('nodes-list');
        const refreshNodesBtn = document.getElementById('refresh-nodes');

        // Initial GUI sync
        providerSelect.value = config.provider;
        apiKeyInput.value = config.apiKey;
        tokenInput.value = config.token;

        providerSelect.addEventListener('change', () => { config.provider = providerSelect.value; });
        apiKeyInput.addEventListener('input', () => { config.apiKey = apiKeyInput.value; });
        tokenInput.addEventListener('input', () => { config.token = tokenInput.value; });

        // Tool declarations (matching schema)
        const TOOLS_SCHEMA = [
            {
                type: "function",
                function: {
                    name: "create_node",
                    description: "Create a TouchDesigner node of a specific type.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Parent network path"},
                            type: {type: "string", description: "Operator type (e.g. MovieFileInTOP, WaveCHOP)"},
                            name: {type: "string", description: "Optional custom name"}
                        },
                        required: ["path", "type"]
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "delete_node",
                    description: "Delete a TouchDesigner node at a path.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Node path to delete"}
                        },
                        required: ["path"]
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "set_parameters",
                    description: "Set parameters for a node.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Node path"},
                            params: {type: "object", description: "Key-value map of parameters"}
                        },
                        required: ["path", "params"]
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "list_nodes",
                    description: "List child nodes of a parent path.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Parent path"}
                        },
                        required: ["path"]
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "get_errors",
                    description: "Get error messages for a node.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Node path"}
                        },
                        required: ["path"]
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "scan_network",
                    description: "Recursively scan the TouchDesigner network topology.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Start path (default *here)"},
                            depth: {type: "integer", description: "Max depth (default 3)"}
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "build_and_verify",
                    description: "Create -> verify (errors) -> preview (viewport verdict) loop for a node.",
                    parameters: {
                        type: "object",
                        properties: {
                            path: {type: "string", description: "Parent path"},
                            op_type: {type: "string", description: "Operator type"},
                            params: {type: "object", description: "Optional params to set"}
                        },
                        required: ["path", "op_type"]
                    }
                }
            }
        ];

        // Call local TouchDesigner bridge
        async function callBridge(tool, args = {}) {
            const url = "/mcp";
            const headers = {
                "Content-Type": "application/json"
            };
            if (config.token) {
                headers["Authorization"] = `Bearer ${config.token}`;
            }
            try {
                const r = await fetch(url, {
                    method: "POST",
                    headers: headers,
                    body: JSON.stringify({ tool, args })
                });
                return await r.json();
            } catch (e) {
                return { ok: false, error: e.toString() };
            }
        }

        // Check health of bridge
        async function checkBridgeStatus() {
            try {
                const r = await fetch("/api/status");
                const res = await r.json();
                if (res.ok) {
                    bridgeDot.className = "status-dot active";
                    bridgeLabel.innerText = "Bridge Online (Port " + res.port + ")";
                    if (!config.token && res.auth) {
                        bridgeLabel.innerText += " - Auth Required";
                    }
                    return true;
                }
            } catch (e) {}
            bridgeDot.className = "status-dot";
            bridgeLabel.innerText = "Bridge Offline";
            return false;
        }

        // Refresh nodes panel
        async function refreshNodes() {
            const online = await checkBridgeStatus();
            if (!online) {
                nodesList.innerHTML = "<div style='opacity:0.5'>Bridge offline</div>";
                return;
            }
            const res = await callBridge("list_nodes", { path: "*here" });
            if (res && res.nodes) {
                nodesList.innerHTML = res.nodes.map(n => `
                    <div class="node-item">
                        <span>${n.name}</span>
                        <span class="node-type">${n.type}</span>
                    </div>
                `).join('');
            } else {
                nodesList.innerHTML = "<div style='opacity:0.5'>No nodes found</div>";
            }
        }

        refreshNodesBtn.addEventListener('click', refreshNodes);
        setInterval(checkBridgeStatus, 3000);
        checkBridgeStatus().then(online => { if (online) refreshNodes(); });

        // Add bubbles
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            // Basic markdown-like parser
            let formatted = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br/>');
            div.innerHTML = formatted;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Chat Loop
        async function runChatSession() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;
            promptInput.value = "";
            addMessage("user", prompt);
            sendBtn.disabled = true;

            // Fetch live context (RAG)
            addMessage("system", "Scanning network context...");
            let activeGraph = "";
            const scan = await callBridge("scan_network", { path: "*here", depth: 2 });
            if (scan.ok) {
                activeGraph = JSON.stringify(scan.nodes, null, 2);
            }

            let systemPrompt = "You are an expert TouchDesigner developer agent. Your goal is to help the user build networks.\n" +
                               "Use spatial marker '*here' to refer to active COMP.\n" +
                               "Always verify your creations cook cleanly by calling get_errors.\n";
            if (activeGraph) {
                systemPrompt += "\nCURRENT NETWORK TOPOLOGY:\n" + activeGraph + "\n";
            }

            const messages = [
                { role: "system", content: systemPrompt },
                { role: "user", content: prompt }
            ];

            const provider = config.provider;
            let baseUrl = "http://localhost:11434/v1";
            let model = "qwen2.5:3b";

            if (provider === "gemini") {
                baseUrl = "https://generativelanguage.googleapis.com/v1beta/openai";
                model = "gemini-2.5-flash";
            } else if (provider === "openai") {
                baseUrl = "https://api.openai.com/v1";
                model = "gpt-4o-mini";
            }

            const headers = {
                "Content-Type": "application/json"
            };
            if (config.apiKey) {
                if (provider === "gemini") {
                    headers["api-key"] = config.apiKey;
                } else {
                    headers["Authorization"] = `Bearer ${config.apiKey}`;
                }
            }

            let url = `${baseUrl}/chat/completions`;
            if (provider === "gemini" && config.apiKey) {
                url += `?key=${config.apiKey}`;
            }

            const maxSteps = 10;
            for (let step = 0; step < maxSteps; step++) {
                addMessage("system", `Loop step ${step + 1}...`);
                const payload = {
                    model: model,
                    messages: messages,
                    tools: TOOLS_SCHEMA
                };

                try {
                    const r = await fetch(url, {
                        method: "POST",
                        headers: headers,
                        body: JSON.stringify(payload)
                    });
                    if (!r.ok) {
                        const errText = await r.text();
                        addMessage("system", `API ERROR: ${r.status} ${errText}`);
                        break;
                    }
                    const resp = await r.json();
                    const choice = resp.choices[0];
                    const message = choice.message;

                    messages.push(message);

                    if (message.content) {
                        addMessage("agent", message.content);
                    }

                    const toolCalls = message.tool_calls;
                    if (!toolCalls || toolCalls.length === 0) {
                        addMessage("system", "Task finished successfully.");
                        break;
                    }

                    // Execute tool calls in parallel/sequence
                    const toolOutputs = [];
                    for (const call of toolCalls) {
                        const name = call.function.name;
                        let args = {};
                        try { args = JSON.parse(call.function.arguments); } catch(e) {}
                        
                        addMessage("system", `Executing tool: ${name}(${JSON.stringify(args)})`);
                        const result = await callBridge(name, args);
                        
                        toolOutputs.push({
                            role: "tool",
                            tool_call_id: call.id,
                            name: name,
                            content: JSON.stringify(result)
                        });
                    }

                    messages.push(...toolOutputs);

                } catch (e) {
                    addMessage("system", `Network error: ${e.toString()}`);
                    break;
                }
            }

            sendBtn.disabled = false;
            refreshNodes();
        }

        sendBtn.addEventListener('click', runChatSession);
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') runChatSession();
        });
    </script>
</body>
</html>
